apiVersion: v1
kind: Namespace
metadata:
  name: strategyforge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategyforge-api
  namespace: strategyforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: strategyforge-api
  template:
    metadata:
      labels:
        app: strategyforge-api
    spec:
      containers:
      - name: api
        image: strategyforge-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # GPU API Configuration
        - name: VLLM_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: strategyforge-config
              key: vllm_base_url
        - name: VLLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: strategyforge-config
              key: vllm_model
        # Application config
        - name: DEBUG
          value: "False"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: outputs
          mountPath: /app/outputs
      volumes:
      - name: outputs
        persistentVolumeClaim:
          claimName: strategyforge-outputs
---
apiVersion: v1
kind: Service
metadata:
  name: strategyforge-api
  namespace: strategyforge
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: strategyforge-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: strategyforge-config
  namespace: strategyforge
data:
  vllm_base_url: "http://vllm-service:8000/v1"
  vllm_model: "meta-llama/Llama-2-7b-chat-hf"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: strategyforge-outputs
  namespace: strategyforge
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi

